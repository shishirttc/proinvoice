<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base href="/proinvoice/">
    <title>PRO INVOICE</title>
    <!-- Relative paths for XAMPP subfolder support -->
    <script type="module" crossorigin src="assets/index-gttbscRp.js"></script>
    <link rel="stylesheet" crossorigin href="assets/index-DdWVTBU_.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function() {
        // --- 1. UI Setup ---
        const widgetContainer = document.createElement('div');
        widgetContainer.style.cssText = 'position:fixed;bottom:20px;right:20px;z-index:99999;font-family:system-ui,-apple-system,sans-serif;display:flex;flex-direction:column;align-items:flex-end;gap:15px;pointer-events:none;';
        document.body.appendChild(widgetContainer);

        // Error & Notification Toasts Container
        const toastContainer = document.createElement('div');
        toastContainer.style.cssText = 'display:flex;flex-direction:column;gap:10px;align-items:flex-end;';
        widgetContainer.appendChild(toastContainer);

        // Main Panel
        const panel = document.createElement('div');
        panel.style.cssText = 'width:350px;height:450px;background:white;border-radius:12px;box-shadow:0 10px 25px rgba(0,0,0,0.15);display:none;flex-direction:column;overflow:hidden;pointer-events:auto;border:1px solid #e5e7eb;transition:all 0.3s ease;';
        panel.innerHTML = `
          <div style="background:#2563eb;color:white;padding:12px 16px;font-weight:bold;display:flex;justify-content:space-between;align-items:center;">
            <span>🤖 System Monitor & Assistant</span>
            <button id="close-assistant" style="background:none;border:none;color:white;cursor:pointer;font-size:18px;">&times;</button>
          </div>
          <div style="display:flex;background:#f3f4f6;border-bottom:1px solid #e5e7eb;">
            <button id="tab-monitor" style="flex:1;padding:8px;border:none;background:#e5e7eb;cursor:pointer;font-weight:bold;color:#1e40af;">Monitor Log</button>
            <button id="tab-chat" style="flex:1;padding:8px;border:none;background:transparent;cursor:pointer;color:#6b7280;">Ask Question</button>
          </div>
          <div id="view-monitor" style="flex:1;overflow-y:auto;padding:12px;background:#1e293b;color:#a7f3d0;font-family:monospace;font-size:12px;display:flex;flex-direction:column;gap:5px;scrollbar-width: thin; scrollbar-color: #475569 transparent;">
            <div style="color:#94a3b8;">System initialized... Monitoring active.</div>
          </div>
          <div id="view-chat" style="flex:1;display:none;flex-direction:column;background:#f9fafb;">
            <div id="chat-messages" style="flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;scrollbar-width: thin; scrollbar-color: #cbd5e1 transparent;">
               <div style="background:#e0e7ff;padding:8px 12px;border-radius:8px;align-self:flex-start;max-width:85%;font-size:13px;color:#1e40af;">नमस्ते! আমি আপনার সিস্টেম অ্যাসিস্ট্যান্ট। অ্যাডভান্স ক্রেডিট, ডিউ বা ইনভয়েস সম্পর্কে যেকোনো প্রশ্ন করতে পারেন।</div>
            </div>
            <div style="padding:10px;background:white;border-top:1px solid #e5e7eb;display:flex;gap:5px;">
              <input id="chat-input" type="text" placeholder="প্রশ্ন করুন..." style="flex:1;padding:8px;border:1px solid #d1d5db;border-radius:6px;outline:none;font-size:13px;">
              <button id="chat-send" style="background:#2563eb;color:white;border:none;padding:8px 12px;border-radius:6px;cursor:pointer;font-weight:bold;">পাঠান</button>
            </div>
          </div>
        `;
        widgetContainer.appendChild(panel);

        // Toggle Button
        const toggleBtn = document.createElement('button');
        toggleBtn.innerHTML = '🤖';
        toggleBtn.style.cssText = 'width:50px;height:50px;border-radius:25px;background:#2563eb;color:white;border:none;box-shadow:0 4px 12px rgba(37,99,235,0.4);font-size:24px;cursor:pointer;pointer-events:auto;display:flex;align-items:center;justify-content:center;transition:transform 0.2s;';
        toggleBtn.onmouseover = () => toggleBtn.style.transform = 'scale(1.1)';
        toggleBtn.onmouseout = () => toggleBtn.style.transform = 'scale(1)';
        widgetContainer.appendChild(toggleBtn);

        // --- 2. Logic & Interactions ---
        let panelOpen = false;
        toggleBtn.onclick = () => {
          panelOpen = !panelOpen;
          panel.style.display = panelOpen ? 'flex' : 'none';
          if(panelOpen) document.getElementById('chat-input').focus();
        };
        document.getElementById('close-assistant').onclick = () => {
          panelOpen = false;
          panel.style.display = 'none';
        };

        const tabMonitor = document.getElementById('tab-monitor');
        const tabChat = document.getElementById('tab-chat');
        const viewMonitor = document.getElementById('view-monitor');
        const viewChat = document.getElementById('view-chat');

        tabMonitor.onclick = () => {
          tabMonitor.style.background = '#e5e7eb'; tabMonitor.style.fontWeight = 'bold'; tabMonitor.style.color = '#1e40af';
          tabChat.style.background = 'transparent'; tabChat.style.fontWeight = 'normal'; tabChat.style.color = '#6b7280';
          viewMonitor.style.display = 'flex'; viewChat.style.display = 'none';
        };
        tabChat.onclick = () => {
          tabChat.style.background = '#e5e7eb'; tabChat.style.fontWeight = 'bold'; tabChat.style.color = '#1e40af';
          tabMonitor.style.background = 'transparent'; tabMonitor.style.fontWeight = 'normal'; tabMonitor.style.color = '#6b7280';
          viewChat.style.display = 'flex'; viewMonitor.style.display = 'none';
        };

        // Notifications
        function showToast(type, title, message) {
            const el = document.createElement('div');
            const isError = type === 'error';
            el.style.cssText = `background:${isError ? '#fee2e2' : '#dcfce3'};border-left:4px solid ${isError ? '#ef4444' : '#10b981'};color:${isError ? '#991b1b' : '#065f46'};padding:12px 16px;border-radius:6px;box-shadow:0 4px 6px rgba(0,0,0,0.1);font-size:13px;pointer-events:auto;min-width:250px;`;
            el.innerHTML = `<div style="font-weight:bold;margin-bottom:4px;">${title}</div><div style="line-height:1.3;">${message}</div>`;
            toastContainer.appendChild(el);
            setTimeout(() => { if (el.parentElement) el.remove(); }, isError ? 10000 : 4000);
        }

        // Add to Monitor Log
        function logAction(msg, isErr = false) {
           const time = new Date().toLocaleTimeString();
           const div = document.createElement('div');
           div.style.color = isErr ? '#f87171' : '#a7f3d0';
           div.innerHTML = `<span style="color:#64748b;">[${time}]</span> ${msg}`;
           viewMonitor.appendChild(div);
           viewMonitor.scrollTop = viewMonitor.scrollHeight;
        }

        // --- 3. Monitoring (Network & Errors) ---
        window.addEventListener('error', e => { if (!e.message.includes('ResizeObserver')) { logAction(`JS Error: ${e.message}`, true); showToast('error', 'সিস্টেম এরর', e.message); } });
        window.addEventListener('unhandledrejection', e => { logAction(`Promise Error: ${e.reason?.message || 'Unknown'}`, true); });

        const originalFetch = window.fetch;
        window.fetch = async function(...args) {
            const url = typeof args[0] === 'string' ? args[0] : args[0].url;
            const method = (args[1] && args[1].method) ? args[1].method.toUpperCase() : 'GET';
            
            try {
                const response = await originalFetch(...args);
                
                // Track mutations (POST/DELETE) for the Monitor
                if (method !== 'GET' && url.includes('api.php')) {
                    let actionName = "ডেটা আপডেট";
                    if (url.includes('invoices')) actionName = "ইনভয়েস সেভ";
                    if (url.includes('customers')) actionName = "কাস্টমার সেভ";
                    if (url.includes('payments')) actionName = "পেমেন্ট অ্যাড";
                    if (method === 'DELETE') actionName = "রেকর্ড ডিলিট";
                    
                    if (response.ok) {
                        logAction(`সফল: ${actionName} (${method})`);
                        showToast('success', 'অ্যাকশন ডিটেক্টেড', `${actionName} সফল হয়েছে।`);
                    } else {
                        logAction(`ব্যর্থ: ${actionName} (Status: ${response.status})`, true);
                        showToast('error', 'API এরর', `${actionName} ব্যর্থ হয়েছে।`);
                    }
                }
                return response;
            } catch (err) {
                logAction(`নেটওয়ার্ক এরর: ${err.message}`, true);
                showToast('error', 'নেটওয়ার্ক এরর', 'সার্ভারের সাথে কানেক্ট করা যাচ্ছে না।');
                throw err;
            }
        };

        // --- 4. Chatbot Logic ---
        const chatInput = document.getElementById('chat-input');
        const chatSend = document.getElementById('chat-send');
        const chatMessages = document.getElementById('chat-messages');

        const knowledgeBase = [
           { keywords: ["advance", "credit", "beshi", "অ্যাডভান্স", "ক্রেডিট", "বেশি"], answer: "যদি কোনো কাস্টমার ইনভয়েসের চেয়ে বেশি টাকা দেয়, তবে বাড়তি টাকা অটোমেটিক কাস্টমারের 'Advance Credit' হিসেবে জমা হয়।" },
           { keywords: ["due", "baki", "soman", "ডিউ", "বাকি", "সমান"], answer: "নতুন ইনভয়েস তৈরির সময় কাস্টমারের যদি Advance Credit থাকে, তবে সিস্টেম অটোমেটিক সেই ক্রেডিট দিয়ে ডিউ অ্যাডজাস্ট করে দিবে।" },
           { keywords: ["sort", "order", "list", "upore", "সর্ট", "লিস্ট", "উপরে"], answer: "ইনভয়েস লিস্ট এখন 'Creation Date' অনুযায়ী সাজানো। অর্থাৎ সবার শেষে তৈরি করা ইনভয়েসটি সবার উপরে থাকবে।" },
           { keywords: ["error", "somossa", "mistake", "এরর", "সমস্যা", "ভুল"], answer: "আমি সবসময় ব্যাকগ্রাউন্ডে মনিটর করছি। কোনো এরর হলে আমি লাল বক্সে আপনাকে জানিয়ে দিব এবং 'Monitor Log' ট্যাবে রেকর্ড রাখব।" },
           { keywords: ["print", "credit dekhabe", "প্রিন্ট", "ক্রেডিট দেখাবে"], answer: "হ্যাঁ, এখন থেকে অ্যাডভান্স ক্রেডিট ইনভয়েস প্রিন্ট করার সময়ও দেখা যাবে।" },
           { keywords: ["hello", "hi", "ki khobor", "হ্যালো", "হাই"], answer: "হ্যালো! আমি আপনার প্রো ইনভয়েস অ্যাসিস্ট্যান্ট। আপনার কোনো প্রশ্ন থাকলে করতে পারেন।" },
           { keywords: ["clear", "delete", "মুছে ফেলো", "ক্লিয়ার"], answer: "আমি চ্যাট হিস্ট্রি মুছে দিয়েছি।", action: "clear_chat" }
        ];

        const CHAT_KEY = 'proinvoice_assistant_history';
        const savedChat = localStorage.getItem(CHAT_KEY);
        if (savedChat) {
            chatMessages.innerHTML = savedChat;
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function saveChatHistory() {
            localStorage.setItem(CHAT_KEY, chatMessages.innerHTML);
        }

        function addMessage(text, isUser = false, isTyping = false) {
           const div = document.createElement('div');
           div.style.cssText = `padding:8px 12px;border-radius:8px;max-width:85%;font-size:13px;margin-bottom:4px;word-wrap:break-word;`;
           if (isUser) {
              div.style.background = '#2563eb'; div.style.color = 'white'; div.style.alignSelf = 'flex-end'; div.style.borderBottomRightRadius = '0';
           } else {
              div.style.background = '#e0e7ff'; div.style.color = '#1e40af'; div.style.alignSelf = 'flex-start'; div.style.borderBottomLeftRadius = '0';
           }
           div.innerHTML = text;
           chatMessages.appendChild(div);
           chatMessages.scrollTop = chatMessages.scrollHeight;
           if (!isTyping) saveChatHistory();
           return div;
        }

        async function fetchLiveData(endpoint) {
            try {
                // Using the actual window fetch to bypass the intercepted one just for raw data if needed, but intercepted one is fine
                const res = await window.fetch('api.php/' + endpoint);
                if (res.ok) return await res.json();
            } catch(e) {}
            return null;
        }

        async function handleChat() {
           const val = chatInput.value.trim().toLowerCase();
           if (!val) return;
           
           addMessage(chatInput.value, true);
           chatInput.value = '';

           const typingIndicator = addMessage("<span style='font-style:italic;color:#6b7280;animation: pulse 1s infinite;'>টাইপ করছে...</span>", false, true);

           setTimeout(async () => {
              typingIndicator.remove();
              let found = false;
              let answer = "";

              // Live Data AI
              if (val.includes("কতজন কাস্টমার") || val.includes("কাস্টমার কয়জন") || val.includes("মোট কাস্টমার") || val.includes("customer")) {
                  const data = await fetchLiveData('customers');
                  if (data) { answer = `আপনার সিস্টেমে বর্তমানে মোট <b>${data.length}</b> জন কাস্টমার আছেন।`; found = true; }
              } else if (val.includes("ইনভয়েস কয়টা") || val.includes("মোট ইনভয়েস") || val.includes("invoice")) {
                  const data = await fetchLiveData('invoices');
                  if (data) { answer = `আপনার সিস্টেমে বর্তমানে মোট <b>${data.length}</b> টি ইনভয়েস সেভ করা আছে।`; found = true; }
              } else if (val.includes("পেমেন্ট") || val.includes("payment")) {
                   answer = "পেমেন্টের তালিকা আপনি ড্যাশবোর্ড বা ইনভয়েস পেজ থেকে দেখতে পারবেন। অ্যাডভান্স পেমেন্ট অটোমেটিক অ্যাডজাস্ট হয়।"; found = true; 
              }

              if (!found) {
                  for (const item of knowledgeBase) {
                     if (item.keywords.some(kw => val.includes(kw))) {
                        if(item.action === "clear_chat") {
                            chatMessages.innerHTML = '<div style="background:#e0e7ff;padding:8px 12px;border-radius:8px;align-self:flex-start;max-width:85%;font-size:13px;color:#1e40af;">নমস্তে! আমি আপনার সিস্টেম অ্যাসিস্ট্যান্ট। চ্যাট হিস্ট্রি মুছে ফেলা হয়েছে।</div>';
                            localStorage.removeItem(CHAT_KEY);
                            return;
                        }
                        answer = item.answer;
                        found = true;
                        break;
                     }
                  }
              }

              if (!found) {
                 answer = "আমি বুঝতে পারিনি। তবে আপনি আমাকে <b>'মোট কাস্টমার কতজন?'</b> বা <b>'কয়টা ইনভয়েস আছে?'</b> এ ধরনের লাইভ প্রশ্নও করতে পারেন!";
              }
              
              addMessage(answer);
           }, 700);
        }

        chatSend.onclick = handleChat;
        chatInput.onkeypress = (e) => { if (e.key === 'Enter') handleChat(); };

        // --- 5. Styles ---
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
            #view-monitor::-webkit-scrollbar, #chat-messages::-webkit-scrollbar { width: 5px; }
            #view-monitor::-webkit-scrollbar-track, #chat-messages::-webkit-scrollbar-track { background: transparent; }
            #view-monitor::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
            #chat-messages::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        `;
        document.head.appendChild(style);
      })();
    </script>
  </body>
</html>
